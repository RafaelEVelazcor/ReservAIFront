app = "passmanager-front"
primary_region = "dfw"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    STAGE = "production"

[http_service]
  internal_port = 3002
  force_https = false
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[env]
  PORT = "3002"